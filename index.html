<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CoachApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css?v=3">
</head>
<body>

  <!-- ═══ AUTH SCREEN ═══ -->
  <div id="auth-screen" class="auth-screen" style="display:none">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">C</div>
        <span class="auth-wordmark">CoachApp</span>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to your account</p>
        <div class="field">
          <label class="field-label">Email</label>
          <input class="field-input" type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <input class="field-input" type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <p class="auth-error" id="login-error"></p>
        <button class="btn-primary btn-full" type="submit" id="login-submit">Sign in</button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
      </form>

      <!-- Invite acceptance (set password) -->
      <form id="invite-form" class="auth-form" style="display:none">
        <h2 class="auth-title">Set your password</h2>
        <p class="auth-subtitle">You've been invited to CoachApp. Choose a password to get started.</p>
        <div class="field">
          <label class="field-label">Full name</label>
          <input class="field-input" type="text" id="invite-name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <input class="field-input" type="password" id="invite-password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <p class="auth-error" id="invite-error"></p>
        <button class="btn-primary btn-full" type="submit" id="invite-submit">Activate account</button>
      </form>

      <!-- Sign up -->
      <form id="signup-form" class="auth-form" style="display:none">
        <h2 class="auth-title">Create account</h2>
        <p class="auth-subtitle">Get started for free</p>
        <div class="field">
          <label class="field-label">Full name</label>
          <input class="field-input" type="text" id="signup-name" placeholder="Jake West" required>
        </div>
        <div class="field">
          <label class="field-label">Email</label>
          <input class="field-input" type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <input class="field-input" type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <p class="auth-error" id="signup-error"></p>
        <button class="btn-primary btn-full" type="submit" id="signup-submit">Create account</button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign in</a></p>
      </form>
    </div>
  </div>

  <!-- ═══ APP SHELL ═══ -->
  <div id="app-shell" class="app-shell" style="display:none">

    <!-- Sidebar (desktop) -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">C</div>
        <span class="sidebar-wordmark">CoachApp</span>
      </div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="view-switcher" style="display:none;margin-bottom:10px">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px">View as</div>
          <div style="display:flex;background:var(--surface-2);border-radius:8px;padding:3px;gap:2px">
            <button id="vs-coach" onclick="switchView('coach')" style="flex:1;padding:5px 8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s">PT</button>
            <button id="vs-client" onclick="switchView('client')" style="flex:1;padding:5px 8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s">Client</button>
          </div>
        </div>
        <div class="user-pill">
          <div class="user-avatar" id="user-avatar">?</div>
          <span class="user-name" id="user-name">Loading...</span>
        </div>
        <button class="btn-signout" id="sign-out-btn">Sign out</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <div class="loading-state">Loading...</div>
    </main>

    <!-- Mobile view switcher (master account only) -->
    <div id="mobile-view-switcher" style="position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;box-shadow:0 2px 12px rgba(0,0,0,.15)">
      <button id="mvs-coach" onclick="switchView('coach')" style="padding:5px 16px;border:none;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer">PT</button>
      <button id="mvs-client" onclick="switchView('client')" style="padding:5px 16px;border:none;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer">Client</button>
    </div>

    <!-- Bottom nav (mobile) -->
    <nav class="bottom-nav"></nav>

  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/app.js?v=123"></script>
</body>
</html>
